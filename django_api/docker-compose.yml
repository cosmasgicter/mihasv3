# MIHAS Django API — Docker Compose
# Uses real Neon DB, Upstash Redis, R2 storage from .env

services:
  web:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    command: uvicorn config.asgi:application --host 0.0.0.0 --port 8000 --workers 3 --reload

  celery:
    build: .
    command: celery -A config worker -l info
    depends_on:
      - web
    env_file:
      - .env
