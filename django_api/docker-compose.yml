services:
  web:
    build: .
    ports:
      - "8000:8000"
    depends_on:
      - redis
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.dev
      - DATABASE_URL=postgres://mihas:mihas@host.docker.internal:5432/mihas
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - JWT_SIGNING_KEY=dev-jwt-signing-key-change-in-production
      - SECRET_KEY=dev-secret-key-change-in-production
      - ALLOWED_HOSTS=localhost,127.0.0.1
      - CORS_ALLOWED_ORIGINS=http://localhost:5173,http://127.0.0.1:5173
      - CSRF_TRUSTED_ORIGINS=http://localhost:5173
      - RESEND_API_KEY=re_dev_placeholder
      - EMAIL_FROM=noreply@mihas.edu.zm
      - S3_ENDPOINT_URL=http://localhost:9000
      - S3_BUCKET=mihas-dev
      - S3_ACCESS_KEY=minioadmin
      - S3_SECRET_KEY=minioadmin
      - DEBUG=true
    command: gunicorn config.wsgi:application --bind 0.0.0.0:8000 --graceful-timeout 30 --workers 3 --reload

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  celery:
    build: .
    command: celery -A config worker -l info
    depends_on:
      - redis
      - web
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.dev
      - DATABASE_URL=postgres://mihas:mihas@host.docker.internal:5432/mihas
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - JWT_SIGNING_KEY=dev-jwt-signing-key-change-in-production
      - SECRET_KEY=dev-secret-key-change-in-production
      - ALLOWED_HOSTS=localhost,127.0.0.1
      - CORS_ALLOWED_ORIGINS=http://localhost:5173,http://127.0.0.1:5173
      - RESEND_API_KEY=re_dev_placeholder
      - EMAIL_FROM=noreply@mihas.edu.zm
      - S3_ENDPOINT_URL=http://localhost:9000
      - S3_BUCKET=mihas-dev
      - S3_ACCESS_KEY=minioadmin
      - S3_SECRET_KEY=minioadmin
      - DEBUG=true
