  /api/v1/admin/institutions/{institution_id}/audit/:
    get:
      operationId: admin_institution_audit_list
      description: |-
        GET /api/v1/admin/institutions/<id>/audit/ — scoped per-institution feed (R13.5).

        Returns tenant Audit_Events for a single institution. A non-super-admin
        School_Staff caller may only read audit events for an institution within
        their membership/grant scope; an out-of-scope institution is masked as
        not-found (no leakage of another school's existence or activity). Events
        are matched on ``changes.institution_id`` (always recorded by
        :class:`TenantAuditService`).
      parameters:
      - in: query
        name: action
        schema:
          type: string
      - in: path
        name: institution_id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - admin
      security:
      - jwtBearerAuth: []
      - jwtCookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/TenantAuditLog'
          description: ''
        '401':
          description: Authentication required — missing or invalid credentials.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden — the authenticated user lacks permission for this
            action.
          content:
