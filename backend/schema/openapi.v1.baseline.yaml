  /api/v1/catalog/assignment-preview/:
    get:
      operationId: catalog_assignment_preview
      description: |-
        GET /api/v1/catalog/assignment-preview/ - resolve the assigned school.

        Program-first wizard (R10.2): given a canonical ``program_id`` + ``intake_id``
        (plus optional residency inputs and white-label ``institution`` context),
        re-run the canonical :class:`OfferingAssignmentService` and return the
        assigned school, resolved fee, required documents, and school contact so the
        student can review them *before* payment. This is a read-only preview that
        creates no application row; the authoritative assignment still runs at
        application create/submit. It mirrors the assignment surfaced in the
        application-create response so the wizard's assigned-school checkpoint
        matches the eventual create result for the same inputs.
      parameters:
      - in: query
        name: country
        schema:
          type: string
        description: Student residence country, used for residency-based fee + rule
          evaluation.
      - in: query
        name: institution
        schema:
          type: string
          format: uuid
        description: White-label school context; restricts candidate offerings to
          this institution.
      - in: query
        name: intake_id
        schema:
          type: string
          format: uuid
        description: Intake UUID the student chose.
        required: true
      - in: query
        name: nationality
        schema:
          type: string
        description: Student nationality, used for residency-based fee + rule evaluation.
      - in: query
        name: program_id
        schema:
          type: string
          format: uuid
        description: Canonical program UUID the student chose.
        required: true
      tags:
      - catalog
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
          description: ''
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: ''
        '401':
          description: Authentication required — missing or invalid credentials.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden — the authenticated user lacks permission for this
            action.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Resource not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error. Logged to GlitchTip.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      summary: Get catalog assignment preview
