# MIHAS Django API — Docker Compose
# Uses real Neon DB, Upstash Redis, R2 storage from .env

services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  web:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    command: uvicorn config.asgi:application --host 0.0.0.0 --port 8000 --reload
    depends_on:
      - redis

  celery:
    build: .
    command: celery -A config worker -l info
    depends_on:
      - web
      - redis
    env_file:
      - .env
