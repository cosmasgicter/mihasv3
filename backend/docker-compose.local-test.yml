# MIHAS — ISOLATED local test stack (throwaway, never touches prod/Neon).
#
# Key isolation properties:
#   - Loads ONLY .env.local.test (local DB/Redis, fake integrations) — it does
#     NOT read backend/.env, so the Neon DATABASE_URL can never leak in.
#   - Its own project name + named volume (postgres-localtest-data) so it is
#     fully separate from the default `docker compose` stack and can be wiped
#     freely without affecting anything else.
#   - Postgres/Redis bound to localhost only.
#
# Usage (from backend/, ALWAYS pass -p and this file):
#   docker compose -p mihas-localtest -f docker-compose.local-test.yml --env-file .env.local.test up -d --build
#   docker compose -p mihas-localtest -f docker-compose.local-test.yml down -v   # wipe everything
#
# See LOCAL-TESTING.md for the full runbook.

services:
  postgres:
    image: postgres:16-alpine
    # localhost-only; port 5433 to avoid clashing with any other local Postgres.
    ports:
      - "127.0.0.1:5433:5432"
    environment:
      POSTGRES_DB: mihas_localtest
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres-localtest-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d mihas_localtest"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "127.0.0.1:6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  web:
    build:
      context: .
    ports:
      - "127.0.0.1:8000:8000"
    # ONLY the isolated env file — no backend/.env, no Neon.
    env_file:
      - .env.local.test
    command: uvicorn config.asgi:application --host 0.0.0.0 --port 8000 --reload
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery:
    build:
      context: .
    env_file:
      - .env.local.test
    command: celery -A config worker -l info --concurrency=1
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres-localtest-data:
