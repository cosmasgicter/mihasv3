<!DOCTYPE html>
<html lang="en" class="light" style="color-scheme: light;">
  <head>
    <meta charset="UTF-8" />
    <script>
      (function() {
        if (typeof window !== 'undefined') {
          const originalError = console.error;
          console.error = function(...args) {
            const message = args.join(' ');
            if (
              message.includes('Could not establish connection') ||
              message.includes('Receiving end does not exist') ||
              message.includes('Extension context invalidated') ||
              message.includes('chrome-extension://') ||
              message.includes('Private Access Token challenge')
            ) {
              return;
            }
            originalError.apply(console, args);
          };
        }
      })();
    </script>
    <link rel="icon" href="/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes, viewport-fit=cover" />
    <meta name="referrer" content="no-referrer-when-downgrade" />
    <meta name="robots" content="index, follow" />
    <meta name="description" content="Apply to Mukuba Institute of Health and Allied Sciences (MIHAS). Complete your student application online with real-time eligibility checking for nursing, midwifery, and allied health programs." />

    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#2563eb" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="MIHAS" />
    <link rel="apple-touch-icon" href="/images/logos/mihas-logo.png" />

    <!-- Performance: Preconnect to critical origins -->
    <!-- Supabase preconnect removed - fully migrated to Neon Postgres -->

    <!-- 
      Note: Google Fonts preconnect hints removed as the app uses system fonts (Inter, system-ui).
      If Google Fonts are added in the future, re-add these preconnect hints:
      <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin>
      <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    -->

    <title>MIHAS Application System</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
