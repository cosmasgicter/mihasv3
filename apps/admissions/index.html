<!DOCTYPE html>
<html lang="en" class="light" style="color-scheme: light;">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="referrer" content="no-referrer-when-downgrade" />
    <meta name="robots" content="index, follow" />
    <meta name="description" content="Apply to Mukuba Institute of Health and Applied Sciences (MIHAS). Complete your student application online with real-time eligibility checking for nursing, midwifery, and allied health programs." />

    <!-- Open Graph Meta Tags -->
    <meta property="og:title" content="MIHAS Application System" />
    <meta property="og:description" content="Apply online to Mukuba Institute of Health and Applied Sciences. Nursing, Clinical Medicine, and allied health programs in Zambia." />
    <meta property="og:image" content="https://apply.beanola.com/images/og-image.png" />
    <meta property="og:url" content="https://apply.beanola.com" />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="MIHAS Admissions" />

    <!-- Twitter Card Meta Tags -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="MIHAS Admissions Portal" />
    <meta name="twitter:description" content="Apply online to Mukuba Institute of Health and Applied Sciences. Nursing, Clinical Medicine, and allied health programs in Zambia." />
    <meta name="twitter:image" content="https://apply.beanola.com/images/og-image.png" />

    <!-- Performance: Preconnect to critical origins -->
    <link rel="preconnect" href="https://api.beanola.com" crossorigin />
    <link rel="preconnect" href="https://pay.lenco.co" />
    <link rel="preconnect" href="https://pay.sandbox.lenco.co" />
    <!-- Supabase preconnect removed - fully migrated to Neon Postgres -->

    <!--
      LCP image preload was removed after the May 2026 Phase A regression:
      competing for bandwidth with the entry JS on mobile worsened FCP by
      several seconds even though the image itself was tiny. The hero
      image is served with fetchpriority=high on the <img> tag inside
      LandingPage, which is sufficient once the React component mounts.
      Do not re-add a <link rel="preload" as="image"> here without first
      measuring on a throttled 3G mobile profile.
    -->
    <!-- 
      Font strategy: Inter is used as the primary font via the system font stack.
      No external font files are loaded — the browser uses a locally installed Inter
      or falls back to system-ui / sans-serif. This eliminates font download latency
      entirely and avoids FOIT/FOUT issues.
      
      If a hosted Inter font is added in the future, add:
      <link rel="preload" href="/fonts/Inter.woff2" as="font" type="font/woff2" crossorigin>
    -->

    <!--
      Asset preloading note: Vite generates hashed filenames for CSS and JS bundles
      (e.g., assets/js/index-[hash].js). Vite's built-in modulepreload injection
      handles preloading of the entry module and its direct imports automatically
      in the production build output. Manual <link rel="preload"> tags are not
      needed here since they would require hardcoded hashes that change every build.
      
      The Vite config has modulePreload.polyfill set to false (modern browsers only)
      and cssCodeSplit enabled for optimal loading.
    -->

    <title>MIHAS Application System</title>

    <!--
      Branded inline preloader. Renders before any JS or external CSS loads,
      so the user sees the MIHAS identity within ~100ms of page arrival.
      All visual assets inlined (SVG logo, CSS) to eliminate extra HTTP
      requests on first paint.
    -->
    <style>
      html, body { margin: 0; background: #f8fafc; }
      .mihas-preloader {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 24px;
        background:
          radial-gradient(circle at 20% 15%, rgba(37, 99, 235, 0.08), transparent 45%),
          radial-gradient(circle at 85% 90%, rgba(180, 83, 9, 0.06), transparent 40%),
          #f8fafc;
        font-family: system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        color: #0f172a;
        transition: opacity 0.35s ease;
      }
      .mihas-preloader.fade-out {
        opacity: 0;
        pointer-events: none;
      }
      .mihas-pre-card {
        width: 100%;
        max-width: 360px;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 16px;
        animation: mihas-pre-rise 0.5s ease;
      }
      .mihas-pre-logo {
        width: 64px;
        height: 64px;
        border-radius: 16px;
        background: #ffffff;
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: 0 4px 12px rgba(15, 23, 42, 0.08);
        position: relative;
      }
      .mihas-pre-logo svg,
      .mihas-pre-logo img {
        width: 40px;
        height: 40px;
        object-fit: contain;
      }
      .mihas-pre-logo::after {
        content: "";
        position: absolute;
        inset: -4px;
        border-radius: 20px;
        border: 2px solid transparent;
        border-top-color: #2563eb;
        border-right-color: #2563eb;
        animation: mihas-pre-spin 1.3s cubic-bezier(0.5, 0, 0.5, 1) infinite;
      }
      .mihas-pre-wordmark {
        font-size: 15px;
        font-weight: 600;
        letter-spacing: -0.01em;
        color: #0f172a;
        text-align: center;
      }
      .mihas-pre-sub {
        font-size: 13px;
        color: #475569;
        text-align: center;
        min-height: 1.25em;
        transition: opacity 0.3s ease;
      }
      .mihas-pre-bar {
        width: 100%;
        max-width: 220px;
        height: 3px;
        border-radius: 3px;
        background: rgba(37, 99, 235, 0.12);
        overflow: hidden;
        margin-top: 4px;
      }
      .mihas-pre-bar-inner {
        height: 100%;
        width: 35%;
        border-radius: 3px;
        background: linear-gradient(90deg, #2563eb, #3b82f6, #b45309, #2563eb);
        background-size: 300% 100%;
        animation: mihas-pre-flow 1.6s linear infinite;
      }
      .mihas-pre-slow {
        margin-top: 20px;
        font-size: 12px;
        color: #64748b;
        text-align: center;
      }
      .mihas-pre-slow a {
        color: #2563eb;
        text-decoration: underline;
      }
      @keyframes mihas-pre-rise {
        from { opacity: 0; transform: translateY(6px); }
        to { opacity: 1; transform: none; }
      }
      @keyframes mihas-pre-spin {
        to { transform: rotate(360deg); }
      }
      @keyframes mihas-pre-flow {
        0% { background-position: 100% 0; transform: translateX(-60%); }
        100% { background-position: 0 0; transform: translateX(240%); }
      }
      @media (prefers-reduced-motion: reduce) {
        .mihas-pre-card { animation: none; }
        .mihas-pre-logo::after { animation: none; border-color: #2563eb; }
        .mihas-pre-bar-inner { animation: none; width: 100%; }
      }
    </style>

    <!--
      Structured data is injected dynamically by the Seo component in React.
      Static JSON-LD removed to avoid duplication with the dynamic version.
    -->
  </head>
  <body>
    <!--
      Preloader — first thing the browser paints. Shows MIHAS identity and a
      reassuring "we're loading" signal so students on slow mobile networks
      don't think the site is broken and bounce. The outer id="preloader"
      plus .fade-out className keep the existing __dismissPreloader contract
      (main.tsx + preloader.js don't need to change).
    -->
    <div
      id="preloader"
      class="mihas-preloader"
      role="status"
      aria-live="polite"
      aria-label="Loading MIHAS Admissions Portal"
    >
      <div class="mihas-pre-card">
        <div class="mihas-pre-logo">
          <!-- Real MIHAS logo. webp with png fallback; served same-origin
               from /public so it paints before the JS bundle loads. -->
          <picture>
            <source srcset="/images/logos/mihas-logo.webp" type="image/webp" />
            <img
              src="/images/logos/mihas-logo.png"
              alt="MIHAS logo"
              width="40"
              height="40"
              decoding="async"
            />
          </picture>
        </div>
        <div class="mihas-pre-wordmark">
          Mukuba Institute of Health &amp; Applied Sciences
        </div>
        <div
          id="mihas-pre-sub"
          class="mihas-pre-sub"
          data-initial="Getting your application ready&hellip;"
        >
          Getting your application ready&hellip;
        </div>
        <div class="mihas-pre-bar" aria-hidden="true">
          <div class="mihas-pre-bar-inner"></div>
        </div>
      </div>
      <p id="preloader-slow" class="mihas-pre-slow" hidden>
        Taking longer than expected &mdash; <a href="/">reload</a>
      </p>
    </div>
    <div id="root"></div>
    <script src="/preloader.js" defer></script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
