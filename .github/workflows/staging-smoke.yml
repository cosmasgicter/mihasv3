name: Staging Smoke Tests

# Run manually when needed (not every PR — avoids blocking routine merges
# and requires a live staging target).
on:
  workflow_dispatch:
    inputs:
      base_url:
        description: 'Staging base URL'
        default: 'https://staging.mihas.edu.zm'
        required: true
      skip_auth:
        description: 'Skip authenticated endpoints'
        type: boolean
        default: false

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install deps
        run: pip install requests
      - name: Run smoke suite
        env:
          STAGING_TOKEN: ${{ secrets.STAGING_SMOKE_JWT }}
        run: |
          python backend/scripts/staging_smoke.py \
            --base-url "${{ github.event.inputs.base_url }}" \
            --token "$STAGING_TOKEN" \
            --report /tmp/smoke_report.json \
            ${{ github.event.inputs.skip_auth == 'true' && '--skip-auth' || '' }}
      - name: Upload smoke report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: staging-smoke-report
          path: /tmp/smoke_report.json
          retention-days: 30
