name: Backend Governance

on:
  push:
    paths:
      - "backend/**"
      - "docs/schema-ownership.md"
      - "docs/redis-dependency-tiers.md"
      - "docs/decision/**"
      - ".github/workflows/backend-governance.yml"
  pull_request:
    paths:
      - "backend/**"
      - "backend/scripts/**"
      - "docs/schema-ownership.md"
      - "docs/redis-dependency-tiers.md"
      - "docs/decision/**"
      - ".github/workflows/backend-governance.yml"

jobs:
  schema-and-outbox-checks:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: test_mihas
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports: ['6379:6379']
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install backend dependencies
        run: pip install -r requirements.txt

      - name: Static schema verification
        env:
          DJANGO_SETTINGS_MODULE: config.settings.dev
          TESTING: "1"
        run: python3 scripts/verify_schema_static.py

      - name: Focused governance tests
        env:
          DJANGO_SETTINGS_MODULE: config.settings.dev
          TESTING: "1"
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test_mihas
          REDIS_URL: redis://localhost:6379/0
        run: pytest tests/unit/test_outbox_helpers.py tests/unit/test_email_outbox_hardening.py tests/unit/test_communication_service.py -q

  drift-guard:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    env:
      NEON_PROJECT_ID: wild-bar-37055823
      NEON_API_KEY: ${{ secrets.NEON_API_KEY }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # Required for `git log` timestamps used by --check-migration-history-coverage

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install backend dependencies
        run: pip install -r requirements.txt

      - name: Create Neon branch fork
        id: fork
        shell: bash
        run: |
          set -uo pipefail
          # Drift-guard validates the schema against a throwaway Neon branch.
          # Neon is now only the AUTHORING database (production runs on
          # self-hosted Postgres), so a Neon-side problem — missing key, branch
          # quota exhausted (HTTP 422), transient API error — must NOT fail the
          # governance run. The step degrades to a skip and the drift check is
          # bypassed; the schema-and-outbox-checks job remains the hard gate.
          if [ -z "${NEON_API_KEY:-}" ]; then
            echo "::warning::NEON_API_KEY not set — skipping Neon-backed drift-guard."
            echo "skipped=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          api="https://console.neon.tech/api/v2/projects/${NEON_PROJECT_ID}/branches"
          auth="Authorization: Bearer ${NEON_API_KEY}"

          # Best-effort cleanup of stale ci-drift-guard-* branches so an
          # accumulated backlog can't exhaust the project branch quota (the
          # 422 that was failing this job). Never fatal.
          stale=$(curl -fsS -H "$auth" "$api" 2>/dev/null \
            | jq -r '.branches[]? | select(.name | startswith("ci-drift-guard-")) | .id' 2>/dev/null || true)
          for bid in $stale; do
            curl -fsS -X DELETE -H "$auth" "${api}/${bid}" >/dev/null 2>&1 \
              && echo "cleaned stale branch ${bid}" || true
          done

          BRANCH_NAME="ci-drift-guard-${GITHUB_RUN_ID}"
          response=$(curl -fsS -X POST "$api" \
            -H "$auth" \
            -H "Content-Type: application/json" \
            -d "{\"branch\":{\"name\":\"${BRANCH_NAME}\"},\"endpoints\":[{\"type\":\"read_write\"}]}") || {
              echo "::warning::NEON_BRANCH_FORK_UNAVAILABLE — Neon API request failed; skipping drift-guard."
              echo "skipped=true" >> "$GITHUB_OUTPUT"
              exit 0
            }
          branch_id=$(echo "$response" | jq -r '.branch.id')
          conn=$(echo "$response" | jq -r '.connection_uris[0].connection_uri')
          if [ -z "$branch_id" ] || [ "$branch_id" = "null" ] || [ -z "$conn" ] || [ "$conn" = "null" ]; then
            echo "::warning::NEON_BRANCH_FORK_UNAVAILABLE — incomplete Neon response; skipping drift-guard."
            echo "skipped=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "branch_id=${branch_id}" >> "$GITHUB_OUTPUT"
          echo "DATABASE_URL=${conn}" >> "$GITHUB_ENV"

      - name: Run drift-guard against fork
        if: steps.fork.outputs.skipped != 'true'
        env:
          DJANGO_SETTINGS_MODULE: config.settings.dev
        run: |
          python3 manage.py check_schema_drift \
            --check-fk-indexes \
            --check-migration-history-coverage

      - name: Delete Neon branch fork
        if: always()
        shell: bash
        run: |
          set +e
          if [ -n "${{ steps.fork.outputs.branch_id }}" ]; then
            curl -fsS -X DELETE \
              "https://console.neon.tech/api/v2/projects/${NEON_PROJECT_ID}/branches/${{ steps.fork.outputs.branch_id }}" \
              -H "Authorization: Bearer ${NEON_API_KEY}" \
              || echo "NEON_BRANCH_FORK_CLEANUP_FAILED: $(date -Iseconds)"
          fi
