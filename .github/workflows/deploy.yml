name: Deploy

# Build backend + frontend images, push to GHCR, then SSH to the EC2 box and
# roll the stack. Runs only after the CI workflow succeeds on main, so broken
# code never deploys.
on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]
  workflow_dispatch: {}   # manual "Run workflow" button

concurrency:
  group: deploy-production
  cancel-in-progress: false   # never interrupt an in-flight deploy

env:
  REGISTRY: ghcr.io
  IMAGE_BASE: ghcr.io/${{ github.repository }}

jobs:
  build-and-push:
    # Gate: only on a green CI run (or manual dispatch).
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write        # push to GHCR
    outputs:
      sha: ${{ steps.vars.outputs.sha }}
    steps:
      - uses: actions/checkout@v4

      - id: vars
        run: echo "sha=${GITHUB_SHA::12}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_BASE }}-backend:${{ steps.vars.outputs.sha }}
            ${{ env.IMAGE_BASE }}-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push frontend
        uses: docker/build-push-action@v6
        with:
          context: .                          # repo root (bun workspace)
          file: ./apps/admissions/Dockerfile
          push: true
          # VITE_* are public build-time values (baked into the bundle).
          build-args: |
            VITE_API_BASE_URL=${{ vars.VITE_API_BASE_URL }}
            VITE_APP_BASE_URL=${{ vars.VITE_APP_BASE_URL }}
            VITE_SITE_URL=${{ vars.VITE_SITE_URL }}
            VITE_APP_VERSION=${{ steps.vars.outputs.sha }}
            VITE_GLITCHTIP_DSN=${{ vars.VITE_GLITCHTIP_DSN }}
            VITE_LENCO_PUBLIC_KEY=${{ vars.VITE_LENCO_PUBLIC_KEY }}
            VITE_LENCO_WIDGET_URL=${{ vars.VITE_LENCO_WIDGET_URL }}
          tags: |
            ${{ env.IMAGE_BASE }}-frontend:${{ steps.vars.outputs.sha }}
            ${{ env.IMAGE_BASE }}-frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Copy compose file to the server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: deploy/docker-compose.prod.yml
          target: /home/${{ secrets.EC2_USER }}/mihas
          strip_components: 1

      - name: Pull images & roll the stack
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          # GHCR_PAT: a PAT with read:packages (the box pulls private images).
          script: |
            set -euo pipefail
            cd ~/mihas
            echo "${{ secrets.GHCR_PAT }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            # Pin both images to this exact build in .env (idempotent upsert).
            grep -q '^BACKEND_IMAGE=' .env && sed -i "s|^BACKEND_IMAGE=.*|BACKEND_IMAGE=${{ env.IMAGE_BASE }}-backend:${{ needs.build-and-push.outputs.sha }}|" .env || echo "BACKEND_IMAGE=${{ env.IMAGE_BASE }}-backend:${{ needs.build-and-push.outputs.sha }}" >> .env
            grep -q '^FRONTEND_IMAGE=' .env && sed -i "s|^FRONTEND_IMAGE=.*|FRONTEND_IMAGE=${{ env.IMAGE_BASE }}-frontend:${{ needs.build-and-push.outputs.sha }}|" .env || echo "FRONTEND_IMAGE=${{ env.IMAGE_BASE }}-frontend:${{ needs.build-and-push.outputs.sha }}" >> .env
            docker compose -f docker-compose.prod.yml --env-file .env pull
            docker compose -f docker-compose.prod.yml --env-file .env up -d
            docker image prune -f
            docker compose -f docker-compose.prod.yml ps
