name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: test_mihas
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports: ['6379:6379']
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test_mihas
      REDIS_URL: redis://localhost:6379/0
      DJANGO_SETTINGS_MODULE: config.settings.dev
      JWT_SIGNING_KEY: ci-test-key-not-for-production
      SECRET_KEY: ci-test-secret-not-for-production
    steps:
      - uses: actions/checkout@v4
      - name: Block local Vercel env files
        run: |
          if find . -name '.env.vercel.*' -print -quit | grep -q .; then
            echo "::error::.env.vercel.* files must not be committed or present in CI"
            find . -name '.env.vercel.*' -print
            exit 1
          fi
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
      - run: pip install -r requirements.txt
        working-directory: backend
      - name: Install security tools
        run: pip install pip-audit bandit
        working-directory: backend
      - name: Python dependency audit
        run: pip-audit -r requirements.txt
        working-directory: backend
        continue-on-error: true
      - name: Python security lint
        run: bandit -r apps config -x tests
        working-directory: backend
        continue-on-error: true
      - name: Django checks
        run: python manage.py check
        working-directory: backend
      - name: Critical backend slice
        run: python -m pytest tests/unit/test_drf_csrf_authentication.py tests/unit/test_auth_csrf_headers.py tests/unit/test_session_hardening.py tests/unit/test_device_session_lifecycle.py tests/unit/test_cleanup_stale_sessions_task.py -q
        working-directory: backend
      - name: Circular import check
        run: python scripts/check_circular_imports.py
        working-directory: backend
      - name: Contract parity tests
        run: python -m pytest tests/contract/test_contract_parity.py -q
        working-directory: backend
      - name: Production-fix regression tests (2026-05-19)
        run: python -m pytest tests/integration/test_cors_idempotency_headers.py -v
        working-directory: backend
      - name: Run unit tests
        run: python -m pytest tests/unit/ -q --tb=short
        working-directory: backend
      - name: API quality gate (schema lint + breaking-change vs baseline)
        if: always()
        run: PY=python bash scripts/api_quality.sh --report /tmp/api_quality_report.md
        working-directory: backend
      - name: Upload API quality report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-quality-report
          path: |
            /tmp/api_quality_report.md
            /tmp/current_schema.yaml
            /tmp/current_lint.json
          if-no-files-found: warn
          retention-days: 14

  backend-property:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        shard: [0, 1, 2, 3, 4, 5, 6, 7]
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: test_mihas
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports: ['6379:6379']
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test_mihas
      REDIS_URL: redis://localhost:6379/0
      DJANGO_SETTINGS_MODULE: config.settings.dev
      JWT_SIGNING_KEY: ci-test-key-not-for-production
      SECRET_KEY: ci-test-secret-not-for-production
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
      - run: pip install -r requirements.txt
        working-directory: backend
      - name: Run property tests (shard ${{ matrix.shard }} of 8)
        run: |
          mapfile -t files < <(python scripts/select_property_shard.py --shard "${{ matrix.shard }}" --total 8)
          printf 'Selected property files for shard %s:\n' "${{ matrix.shard }}"
          printf '  %s\n' "${files[@]}"
          python -u -m pytest "${files[@]}" -q --tb=short --durations=25 --timeout=90 --timeout-method=thread -p no:cacheprovider
        working-directory: backend

  admissions:
    runs-on: ubuntu-latest
    env:
      # Build-time public VITE_* values (baked into the bundle; no secrets).
      # Repo Variables override these defaults when set.
      VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL || 'https://api.mihas.edu.zm' }}
      VITE_APP_BASE_URL: ${{ vars.VITE_APP_BASE_URL || 'https://apply.mihas.edu.zm' }}
      VITE_SITE_URL: ${{ vars.VITE_SITE_URL || 'https://apply.mihas.edu.zm' }}
      VITE_APP_VERSION: ${{ github.sha }}
      VITE_GLITCHTIP_DSN: ${{ vars.VITE_GLITCHTIP_DSN || 'https://placeholder@app.glitchtip.com/0' }}
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install
        working-directory: apps/admissions
      - name: Type check
        run: bun run type-check
        working-directory: apps/admissions
      - name: Check dynamic imports resolve
        run: bun run check:imports
        working-directory: apps/admissions
      - name: Critical frontend slice
        run: bunx vitest run tests/unit/PaymentStep.test.tsx tests/unit/paymentStep.test.ts tests/unit/apiClientCsrf403Retry.test.ts tests/unit/sessionHardening.test.ts
        working-directory: apps/admissions
      - name: Lint
        run: bun run lint
        working-directory: apps/admissions
      - name: Unit tests
        run: bun run test
        working-directory: apps/admissions
      - name: Build
        run: bun run build
        working-directory: apps/admissions
      - name: PDF chunk smoke check (TDZ regression guard)
        run: node ../../scripts/check-pdf-chunk-load.mjs
        working-directory: apps/admissions
      - name: Dependency audit
        run: bun pm scan
        working-directory: apps/admissions
        continue-on-error: true

  jobs-ops:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install
        working-directory: apps/jobs-ops
      - name: Type check
        run: bun run type-check
        working-directory: apps/jobs-ops
      - name: Lint
        run: bun run lint
        working-directory: apps/jobs-ops
      - name: Build
        run: bun run build
        working-directory: apps/jobs-ops
      - name: Dependency audit
        run: bun pm scan
        working-directory: apps/jobs-ops
        continue-on-error: true

  design-audit:
    runs-on: ubuntu-latest
    name: Design audit (Impeccable detector)
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install Impeccable CLI
        run: npm install -g impeccable@2.1.9
      - name: Run design audit gate
        run: bun scripts/design-audit-gate.ts
      - name: Upload detector raw output (on failure)
        if: failure()
        run: |
          impeccable detect apps/admissions/src/ > /tmp/imp-admissions.txt 2>&1 || true
          impeccable detect apps/jobs-ops/src/ > /tmp/imp-jobsops.txt 2>&1 || true
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: design-audit-detector-output
          path: |
            /tmp/imp-admissions.txt
            /tmp/imp-jobsops.txt
          retention-days: 7
