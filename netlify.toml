[build]
  command = "npm run build:prod"
  publish = "dist"
  environment = { NODE_VERSION = "22.19.0" }

[dev]
  functionsPort = 8888
  command = "npm run dev"
  targetPort = 5173
  autoLaunch = false
  
[context.production.environment]
  NODE_ENV = "production"
  VITE_NODE_ENV = "production"

[functions]
  directory = "api"
  node_bundler = "esbuild"
  external_node_modules = ["@supabase/supabase-js"]

[[redirects]]
  from = "/api/auth/login"
  to = "/.netlify/functions/auth-login"
  status = 200
  force = true

[[redirects]]
  from = "/api/auth/register"
  to = "/.netlify/functions/auth-register"
  status = 200
  force = true

[[redirects]]
  from = "/api/applications"
  to = "/.netlify/functions/applications"
  status = 200
  force = true

[[redirects]]
  from = "/api/catalog/subjects"
  to = "/.netlify/functions/catalog-subjects"
  status = 200
  force = true

[[redirects]]
  from = "/api/documents/upload"
  to = "/.netlify/functions/documents-upload"
  status = 200
  force = true

[[redirects]]
  from = "/api/health"
  to = "/.netlify/functions/health"
  status = 200
  force = true

[[redirects]]
  from = "/api/notifications/send"
  to = "/.netlify/functions/notifications-send"
  status = 200
  force = true

[[redirects]]
  from = "/api/notifications/application-submitted"
  to = "/.netlify/functions/notifications-application-submitted"
  status = 200
  force = true

[[redirects]]
  from = "/api/push-subscriptions"
  to = "/.netlify/functions/push-subscriptions"
  status = 200
  force = true

[[redirects]]
  from = "/api/user-consents"
  to = "/.netlify/functions/user-consents"
  status = 200
  force = true

[[redirects]]
  from = "/api/admin/dashboard"
  to = "/.netlify/functions/admin-dashboard"
  status = 200
  force = true

[[redirects]]
  from = "/api/admin/audit-log/stats"
  to = "/.netlify/functions/admin-audit-log-stats"
  status = 200
  force = true

[[redirects]]
  from = "/api/admin/audit-log/export"
  to = "/.netlify/functions/admin-audit-log-export"
  status = 200
  force = true

[[redirects]]
  from = "/api/admin/users/:id/role"
  to = "/.netlify/functions/admin-users-id-role?id=:id"
  status = 200
  force = true

[[redirects]]
  from = "/api/admin/users/:id/permissions"
  to = "/.netlify/functions/admin-users-id-permissions?id=:id"
  status = 200
  force = true

[[redirects]]
  from = "/api/admin/users/:id"
  to = "/.netlify/functions/admin-users-id?id=:id"
  status = 200
  force = true

[[redirects]]
  from = "/api/admin/users"
  to = "/.netlify/functions/admin-users"
  status = 200
  force = true

[[redirects]]
  from = "/api/analytics/telemetry"
  to = "/.netlify/functions/analytics-telemetry"
  status = 200
  force = true

[[redirects]]
  from = "/api/analytics/predictive-dashboard"
  to = "/.netlify/functions/analytics-predictive-dashboard"
  status = 200
  force = true

[[redirects]]
  from = "/api/catalog/programs"
  to = "/.netlify/functions/catalog-programs"
  status = 200
  force = true

[[redirects]]
  from = "/api/catalog/intakes"
  to = "/.netlify/functions/catalog-intakes"
  status = 200
  force = true

[[redirects]]
  from = "/api/applications/:id"
  to = "/.netlify/functions/applications-id?id=:id"
  status = 200
  force = true

[[redirects]]
  from = "/api/notifications/dispatch-channel"
  to = "/.netlify/functions/notifications-dispatch-channel"
  status = 200
  force = true

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200



[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/api/*"
  [headers.values]
    Cache-Control = "no-store"



