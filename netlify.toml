[build]
  command = "npm run build:prod"
  publish = "dist"
  environment = { NODE_VERSION = "24" }

[dev]
  functionsPort = 8888
  command = "npm run dev"

[functions]
  directory = "api"

[[redirects]]
  from = "/api/admin/dashboard"
  to = "/.netlify/functions/admin-dashboard"
  status = 200
  force = true

[[redirects]]
  from = "/api/admin/audit-log/stats"
  to = "/.netlify/functions/admin-audit-log-stats"
  status = 200
  force = true

[[redirects]]
  from = "/api/admin/audit-log/export"
  to = "/.netlify/functions/admin-audit-log-export"
  status = 200
  force = true

[[redirects]]
  from = "/api/admin/users/:id/role"
  to = "/.netlify/functions/admin-users-role?id=:id"
  status = 200
  force = true

[[redirects]]
  from = "/api/admin/users/:id/permissions"
  to = "/.netlify/functions/admin-users-permissions?id=:id"
  status = 200
  force = true

[[redirects]]
  from = "/api/admin/users/:id"
  to = "/.netlify/functions/admin-users-id?id=:id"
  status = 200
  force = true

[[redirects]]
  from = "/api/analytics/telemetry"
  to = "/.netlify/functions/analytics-telemetry"
  status = 200
  force = true

[[redirects]]
  from = "/api/analytics/predictive-dashboard"
  to = "/.netlify/functions/analytics-predictive-dashboard"
  status = 200
  force = true

[[redirects]]
  from = "/api/catalog/programs"
  to = "/.netlify/functions/catalog-programs"
  status = 200
  force = true

[[redirects]]
  from = "/api/catalog/intakes"
  to = "/.netlify/functions/catalog-intakes"
  status = 200
  force = true

[[redirects]]
  from = "/api/applications/:id"
  to = "/.netlify/functions/applications-id?id=:id"
  status = 200
  force = true

[[redirects]]
  from = "/api/notifications/dispatch-channel"
  to = "/.netlify/functions/notifications-dispatch-channel"
  status = 200
  force = true

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://challenges.cloudflare.com https://cloud.umami.is; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self' https://*.supabase.co https://application.mihas.edu.zm https://cloud.umami.is; worker-src 'self'"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/api/*"
  [headers.values]
    Cache-Control = "no-store"

