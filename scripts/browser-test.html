<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MIHAS V3 - Browser Compatibility Test</title>
  <style>
    body { font-family: system-ui; max-width: 800px; margin: 50px auto; padding: 20px; }
    .test { padding: 15px; margin: 10px 0; border-radius: 8px; }
    .pass { background: #d4edda; border: 1px solid #c3e6cb; }
    .fail { background: #f8d7da; border: 1px solid #f5c6cb; }
    .info { background: #d1ecf1; border: 1px solid #bee5eb; }
    h1 { color: #333; }
    code { background: #f4f4f4; padding: 2px 6px; border-radius: 3px; }
  </style>
</head>
<body>
  <h1>🧪 MIHAS V3 Browser Compatibility Test</h1>
  <p>This page tests browser features required by MIHAS V3</p>
  <div id="results"></div>

  <script>
    const results = [];

    function test(name, fn) {
      try {
        const result = fn();
        results.push({ name, pass: result, message: result ? 'Supported' : 'Not supported' });
      } catch (e) {
        results.push({ name, pass: false, message: e.message });
      }
    }

    // Run tests
    test('ES6 Features', () => {
      const arrow = () => true;
      const [a, b] = [1, 2];
      const obj = { a, b };
      return arrow() && a === 1 && obj.a === 1;
    });

    test('Async/Await', () => {
      return typeof (async () => {})().then === 'function';
    });

    test('Fetch API', () => {
      return typeof fetch === 'function';
    });

    test('LocalStorage', () => {
      localStorage.setItem('test', '1');
      const result = localStorage.getItem('test') === '1';
      localStorage.removeItem('test');
      return result;
    });

    test('Service Workers', () => {
      return 'serviceWorker' in navigator;
    });

    test('WebSockets', () => {
      return typeof WebSocket === 'function';
    });

    test('File API', () => {
      return typeof File === 'function' && typeof FileReader === 'function';
    });

    test('FormData', () => {
      return typeof FormData === 'function';
    });

    test('CSS Grid', () => {
      return CSS.supports('display', 'grid');
    });

    test('CSS Flexbox', () => {
      return CSS.supports('display', 'flex');
    });

    test('Intersection Observer', () => {
      return typeof IntersectionObserver === 'function';
    });

    test('Crypto API', () => {
      return typeof crypto !== 'undefined' && typeof crypto.subtle !== 'undefined';
    });

    // Display results
    const container = document.getElementById('results');
    const passed = results.filter(r => r.pass).length;
    const total = results.length;

    container.innerHTML = `
      <div class="test info">
        <strong>Browser:</strong> ${navigator.userAgent}<br>
        <strong>Score:</strong> ${passed}/${total} tests passed
      </div>
      ${results.map(r => `
        <div class="test ${r.pass ? 'pass' : 'fail'}">
          <strong>${r.pass ? '✅' : '❌'} ${r.name}</strong><br>
          ${r.message}
        </div>
      `).join('')}
      <div class="test ${passed === total ? 'pass' : 'fail'}">
        <strong>Overall Result:</strong> ${passed === total ? '✅ All tests passed - Browser fully compatible' : `⚠️ ${total - passed} test(s) failed - Some features may not work`}
      </div>
    `;

    // Log to console
    console.log('Browser Compatibility Test Results:', {
      browser: navigator.userAgent,
      passed,
      total,
      results
    });
  </script>
</body>
</html>
