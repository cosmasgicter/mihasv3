[build]
  command = "npm run build:prod"
  publish = "dist"
  environment = { NODE_VERSION = "20.18.0" }

[dev]
  functionsPort = 8888
  command = "npm run dev"
  targetPort = 5173
  autoLaunch = false
  
[context.production.environment]
  NODE_ENV = "production"
  VITE_NODE_ENV = "production"
  MIHAS_USE_MOCK_DATA = "false"

[functions]
  directory = "api"
  node_bundler = "esbuild"
  external_node_modules = ["@supabase/supabase-js"]

